<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>TEMBEH — Songs of the Everglade</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rye&family=Special+Elite&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lora:ital,wght@0,400;0,700;1,400&family=Abril+Fatface&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0a0d08;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }

        .video-container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* Sound toggle button — always on screen during video */
        .sound-btn {
            position: absolute;
            bottom: 2rem;
            right: 1.5rem;
            z-index: 15;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: 2px solid rgba(245, 237, 214, 0.5);
            background: rgba(10, 13, 8, 0.6);
            color: #f5edd6;
            font-size: 1.3rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            transition: all 0.2s;
        }

        .sound-btn:active {
            transform: scale(0.9);
        }

        .sound-btn.hidden { display: none; }

        /* Hint label next to button */
        .sound-hint {
            position: absolute;
            bottom: 2.4rem;
            right: 4.5rem;
            z-index: 15;
            font-family: 'Special Elite', cursive;
            font-size: 0.75rem;
            color: rgba(245, 237, 214, 0.7);
            letter-spacing: 0.1em;
            white-space: nowrap;
            animation: fade-hint 4s ease forwards;
        }

        @keyframes fade-hint {
            0%, 60% { opacity: 1; }
            100% { opacity: 0; pointer-events: none; }
        }

        /* End overlay */
        .overlay {
            position: absolute;
            inset: 0;
            background: rgba(10, 13, 8, 0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
            opacity: 0;
            pointer-events: none;
            transition: opacity 1.2s ease;
            z-index: 20;
        }

        .overlay.visible {
            opacity: 1;
            pointer-events: auto;
        }

        .overlay-stars {
            font-family: 'Special Elite', cursive;
            font-size: 0.9rem;
            color: #c4a265;
            letter-spacing: 0.8em;
            margin-bottom: 1rem;
        }

        .overlay-title {
            font-family: 'Abril Fatface', serif;
            font-size: clamp(2rem, 8vw, 4.5rem);
            color: #f5edd6;
            line-height: 1;
            margin-bottom: 0.3rem;
        }

        .overlay-subtitle {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: clamp(1rem, 3vw, 1.6rem);
            color: #c4a265;
            margin-bottom: 0.5rem;
        }

        .overlay-detail {
            font-family: 'Lora', serif;
            font-size: clamp(0.8rem, 2vw, 1rem);
            color: rgba(245, 237, 214, 0.6);
            margin-bottom: 0.3rem;
        }

        .overlay-badge {
            font-family: 'Special Elite', cursive;
            font-size: 0.7rem;
            color: #c4a265;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            border: 1px solid rgba(196, 162, 101, 0.4);
            padding: 0.3rem 1rem;
            margin-top: 0.8rem;
            margin-bottom: 2rem;
        }

        .overlay-cta {
            display: inline-block;
            font-family: 'Rye', cursive;
            font-size: clamp(0.9rem, 2.5vw, 1.1rem);
            color: #f5edd6;
            text-decoration: none;
            border: 2px solid rgba(245, 237, 214, 0.6);
            padding: 1rem 2.5rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            transition: all 0.4s ease;
            background: rgba(61, 90, 58, 0.25);
        }

        .overlay-cta:hover {
            background: rgba(245, 237, 214, 0.15);
            border-color: #f5edd6;
            transform: scale(1.03);
        }
    </style>
</head>
<body>
    <div class="video-container">
        <video id="promo" autoplay muted playsinline webkit-playsinline preload="auto">
            <source src="images/everglade-promo.mp4?v=2" type="video/mp4">
        </video>

        <!-- Sound toggle on the video -->
        <span class="sound-hint" id="soundHint">tap for sound</span>
        <button class="sound-btn" id="soundBtn">🔇</button>

        <!-- CTA overlay after video ends -->
        <div class="overlay" id="overlay">
            <div class="overlay-stars">✦ ✦ ✦</div>
            <h1 class="overlay-title">TEMBEH</h1>
            <p class="overlay-subtitle">Songs of the Everglade</p>
            <p class="overlay-detail">May 30, 2026 · Heidelberg</p>
            <p class="overlay-detail">Marsilius-Arkaden · 19:30</p>
            <div class="overlay-badge">One Night Only</div>
            <a href="https://pretix.eu/tembeh/hd-2026-05/" class="overlay-cta">Find Tickets</a>
        </div>
    </div>

    <script>
        var video = document.getElementById('promo');
        var soundBtn = document.getElementById('soundBtn');
        var soundHint = document.getElementById('soundHint');
        var overlay = document.getElementById('overlay');

        // Toggle mute on button tap — must call play() again on iOS after unmuting
        soundBtn.addEventListener('click', function(e) {
            e.preventDefault();
            e.stopPropagation();
            if (video.muted) {
                video.muted = false;
                video.play().catch(function(){});
                soundBtn.textContent = '🔊';
            } else {
                video.muted = true;
                soundBtn.textContent = '🔇';
            }
        });

        // Also listen for touchend in case click doesn't fire on some mobile browsers
        soundBtn.addEventListener('touchend', function(e) {
            e.preventDefault();
            soundBtn.click();
        });

        // Hide button when video ends, show overlay
        video.addEventListener('ended', function() {
            overlay.classList.add('visible');
            soundBtn.classList.add('hidden');
        });
    </script>
</body>
</html>
