<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>TEMBEH — Songs of the Everglade</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rye&family=Special+Elite&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lora:ital,wght@0,400;0,700;1,400&family=Abril+Fatface&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0a0d08;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }

        .video-container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* Tap-to-unmute overlay — covers the whole video */
        .unmute-overlay {
            position: absolute;
            inset: 0;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        .unmute-overlay.hidden { display: none; }

        .unmute-icon {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            border: 2px solid rgba(245, 237, 214, 0.6);
            background: rgba(10, 13, 8, 0.5);
            color: #f5edd6;
            font-size: 1.8rem;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: pulse-unmute 2s ease-in-out infinite;
        }

        @keyframes pulse-unmute {
            0%, 100% { opacity: 0.8; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.08); }
        }

        .unmute-label {
            position: absolute;
            bottom: 30%;
            font-family: 'Special Elite', cursive;
            font-size: 0.85rem;
            color: rgba(245, 237, 214, 0.7);
            letter-spacing: 0.15em;
        }

        /* End overlay */
        .overlay {
            position: absolute;
            inset: 0;
            background: rgba(10, 13, 8, 0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
            opacity: 0;
            pointer-events: none;
            transition: opacity 1.2s ease;
            z-index: 20;
        }

        .overlay.visible {
            opacity: 1;
            pointer-events: auto;
        }

        .overlay-stars {
            font-family: 'Special Elite', cursive;
            font-size: 0.9rem;
            color: #c4a265;
            letter-spacing: 0.8em;
            margin-bottom: 1rem;
        }

        .overlay-title {
            font-family: 'Abril Fatface', serif;
            font-size: clamp(2rem, 8vw, 4.5rem);
            color: #f5edd6;
            line-height: 1;
            margin-bottom: 0.3rem;
        }

        .overlay-subtitle {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: clamp(1rem, 3vw, 1.6rem);
            color: #c4a265;
            margin-bottom: 0.5rem;
        }

        .overlay-detail {
            font-family: 'Lora', serif;
            font-size: clamp(0.8rem, 2vw, 1rem);
            color: rgba(245, 237, 214, 0.6);
            margin-bottom: 0.3rem;
        }

        .overlay-badge {
            font-family: 'Special Elite', cursive;
            font-size: 0.7rem;
            color: #c4a265;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            border: 1px solid rgba(196, 162, 101, 0.4);
            padding: 0.3rem 1rem;
            margin-top: 0.8rem;
            margin-bottom: 2rem;
        }

        .overlay-cta {
            display: inline-block;
            font-family: 'Rye', cursive;
            font-size: clamp(0.9rem, 2.5vw, 1.1rem);
            color: #f5edd6;
            text-decoration: none;
            border: 2px solid rgba(245, 237, 214, 0.6);
            padding: 1rem 2.5rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            transition: all 0.4s ease;
            background: rgba(61, 90, 58, 0.25);
        }

        .overlay-cta:hover {
            background: rgba(245, 237, 214, 0.15);
            border-color: #f5edd6;
            transform: scale(1.03);
        }
    </style>
</head>
<body>
    <div class="video-container">
        <video id="promo" autoplay muted playsinline webkit-playsinline preload="auto">
            <source src="images/everglade-promo.mp4?v=2" type="video/mp4">
        </video>

        <!-- Tap anywhere on the video to unmute — big center icon -->
        <div class="unmute-overlay" id="unmuteOverlay">
            <div class="unmute-icon">🔇</div>
            <span class="unmute-label">tap for sound</span>
        </div>

        <!-- CTA overlay after video ends -->
        <div class="overlay" id="overlay">
            <div class="overlay-stars">✦ ✦ ✦</div>
            <h1 class="overlay-title">TEMBEH</h1>
            <p class="overlay-subtitle">Songs of the Everglade</p>
            <p class="overlay-detail">May 30, 2026 · Heidelberg</p>
            <p class="overlay-detail">Marsilius-Arkaden · 19:30</p>
            <div class="overlay-badge">One Night Only</div>
            <a href="https://pretix.eu/tembeh/hd-2026-05/" class="overlay-cta">Find Tickets</a>
        </div>
    </div>

    <script>
        var video = document.getElementById('promo');
        var unmuteOverlay = document.getElementById('unmuteOverlay');
        var overlay = document.getElementById('overlay');

        // Tap anywhere on the unmute overlay to unmute and play with sound
        unmuteOverlay.addEventListener('click', function() {
            video.muted = false;
            video.play().catch(function(){});
            unmuteOverlay.classList.add('hidden');
        });

        // Hide unmute overlay when video ends, show end overlay
        video.addEventListener('ended', function() {
            overlay.classList.add('visible');
            unmuteOverlay.classList.add('hidden');
        });
    </script>
</body>
</html>
